name: Build and Push Docker Image

# Builds and publishes a multi-arch Docker image to GitHub Container Registry.
# Triggered by:
#   - push to main      → tags `latest`, `main`
#   - push to beta-*    → tags `beta` + the branch name (e.g. `beta-3.0`)
#   - push of a v* tag  → tags `3`, `3.1`, `3.1.0`, `latest`
# Multi-arch (linux/amd64 + linux/arm64) so Raspberry Pi / ARM hosts work
# without local builds. Image is published as ghcr.io/<owner>/bambuboard.

on:
  push:
    branches: [main, 'beta-*']
    tags:     ['v*.*.*']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bambuboard
          # Tag rules:
          #   - main branch        → `latest` + branch name
          #   - beta-* branches    → `beta` + branch name (e.g. `beta-3.0`)
          #   - semver tag         → `3`, `3.1`, `3.1.0`, plus `latest`
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=beta,enable=${{ startsWith(github.ref_name, 'beta-') }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
