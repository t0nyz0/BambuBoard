<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BambuBoard</title>
  <link rel="stylesheet" type="text/css" href="../styles.css">
  <style>
    /* Uniform height-fill chain — see /widgets/ams/index.html for the
       canonical explanation. Card fills iframe edge-to-edge so iframe
       gaps in the OBS template equal visible card gaps. */
    html, body { height: 100%; margin: 0; }
    body { background: transparent !important; }
    .container { height: 100%; box-sizing: border-box; }
    .bed-title { height: 100%; box-sizing: border-box; display: flex; flex-direction: column; }
  </style>
  <script src="../_customizer.js"></script>
    <script src="../../assets/js/jquery-3.6.0.min.js"></script>
  <meta http-equiv="refresh" content="28800">
</head>

<link rel="stylesheet" href="../../assets/css/material-symbols.css" />
<body>
<div class="container">
    <div class="bed-title">
      <h2 class="partTitle">Chamber Temperature</h2>
                  <div class="progress-wrapper">
            <div id="chamberProgressBarParent" class="progress">
              <div id="chamberProgressBar" class="progress-bar" style="width: 5px; background-color: #5c0000;"></div>
            </div>
          </div>
        <div style="display: flex;justify-content: space-between;">
          <h4 class="finePrint">
            <b>Current: <span id="chamberCurrentTempC">0</span></b><span id="chamberCurrentTempSymbolsC"><b><sup>°</sup>C</b></span> <span style="color:grey;"><span id="chamberCurrentTempF">0</span><span id="chamberCurrentTempSymbolsF"><sup>°</sup>F</span>
          </h4>
          <h4 class="finePrint">
            <b>Max: <span id="chamberTargetTempC">0</span><span id="chamberTargetTempSymbolsC"><sup>°</sup>C</b></span> <span style="color:grey;"><span id="chamberTargetTempF">0</span><span id="chamberTargetTempSymbolsF"><sup>°</sup>F</span></span>
          </h4>
      </div>
    </div>
    
      </div>

<script src="CHAMBER_script.js"></script>

</body>
</html>
