<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>BambuBoard</title>
    <link rel="stylesheet" type="text/css" href="../styles.css" />
    <style>
      /* Height-fill chain — see /widgets/ams/index.html. Without this the
         widget content sits at natural height and leaves dead space inside
         a bounded iframe, which shows up as visible gap before the next
         widget on the OBS canvas. */
      html, body { height: 100%; margin: 0; }
      body { background: transparent !important; }
      .container { height: 100%; box-sizing: border-box; }
      .bedcontainer { height: 100%; margin-top: 0; box-sizing: border-box; }
      .bed-title {
        height: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .bed-title .printDetailsContainer { width: 100%; }
    </style>
    <script src="../_customizer.js"></script>
    <script src="../../assets/js/jquery-3.6.0.min.js"></script>
    <meta http-equiv="refresh" content="28800" />
  </head>

  <link
    rel="stylesheet"
    href="../../assets/css/material-symbols.css"/>
  <body>
    <div class="container">
      <div class="bedcontainer">
        <div class="bed-title">
              <div class="printDetailsContainer">
                <h3>
                  <span class="fade printRemaining">Remaining:</span>
                  <span class="printRemaining" id="printRemaining">unknown</span>
                  <span class="printRemaining"></span>
                </h3>
                <h3>
                  <span class="fade">ETA:</span> <span id="printETA">...</span>
                </h3>
                <h3 class="ellipsis">
                  <span class="fade">Model:</span>
                  <span id="printModelName">...</span>
                  <span id="printModeName2"></span>
                </h3>
                <h3>
                  <span class="fade">Layer:</span>
                  <span id="printCurrentLayer">...</span>
                </h3>
                <h3>
                  <span class="fade">Filament weight:</span>
                  <span id="modelWeight">...</span>
                </h3>

              </div>
            </div>
      </div>
    </div>
    <script src="INFO_script.js"></script>
  </body>
</html>
