<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>BambuBoard</title>
    <link rel="stylesheet" type="text/css" href="../styles.css" />
    <style>
      /* Uniform height-fill chain — see /widgets/ams/index.html. bed-temp
         uses the .grid > .column > .bed-title wrapper, so the chain has
         extra steps. Result: card fills iframe edge-to-edge. */
      html, body { height: 100%; margin: 0; }
      body { background: transparent !important; }
      .container { height: 100%; box-sizing: border-box; }
      .bedcontainer { height: 100%; margin-top: 0; box-sizing: border-box; }
      .grid.grid-gap-30 { height: 100%; }
      .column.grid-gap-10 { height: 100%; display: flex; flex-direction: column; align-items: stretch; }
      .bed-title { flex: 1; box-sizing: border-box; display: flex; flex-direction: column; min-height: 0; }
    </style>
    <script src="../_customizer.js"></script>
    <script src="../../assets/js/jquery-3.6.0.min.js"></script>
    <meta http-equiv="refresh" content="28800" />
  </head>

  <link
    rel="stylesheet"
    href="../../assets/css/material-symbols.css"
  />
  <body>
    <div class="container">
      <div class="bedcontainer">
        <div class="grid grid-gap-30">
          <div class="column grid-gap-10">
            <div class="bed-title">
              <h2 class="partTitle">Bed Temperature</h2>
                          <div class="progress-wrapper">
                    <div id="bedProgressBarParent" class="progress">
                      <div id="bedProgressBar" class="progress-bar" style="width: 5px; background-color: #FFCC41;"></div>
                    </div>
                  </div>
        
                <div style="display: flex;justify-content: space-between;">
                  <h4 class="finePrint">
                    <b>Current: <span id="bedCurrentTempC">0</span></b></span><span id="bedCurrentTempSymbolsC"><b><sup>°</sup>C</b></span> <span style="color:grey;"><span id="bedCurrentTempF">0</span><span id="bedCurrentTempSymbolsF"><sup>°</sup>F</span>
                  </h4>
                  <h4 class="finePrint">
                    <b>Target: <span id="bedTargetTempC">0</span><span id="bedTargetTempSymbolsC"><sup>°</sup>C</b></span> <span style="color:grey;"><span id="bedTargetTempF">0</span><span id="bedTargetTempSymbolsF"><sup>°</sup>F</span></span>
                  </h4>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>


    <script src="BED_script.js"></script>
  </body>
</html>
