<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>BambuBoard | AMS</title>
    <link rel="stylesheet" type="text/css" href="../styles.css" />
    <style>
      /* Combined AMS widget — temp/humidity/drying status header followed
         by 4 tray rows. Replaces the old split between ams-temp/ and ams/
         widgets. The header takes natural height; the trays fill the
         remaining vertical space evenly.

         Sits side-by-side with its sibling (AMS #2). Uses asymmetric
         container margins so the visible card aligns with full-width
         widgets above (15px outer) and only leaves a small gap with
         the sibling (5px inner). Body bg transparent as a defensive
         fallback in case iframes overlap. */
      html, body { height: 100%; margin: 0; }
      body { background: transparent !important; }
      .container { margin-left: 15px; margin-right: 5px; }
      .container, .bedcontainer { height: 100%; box-sizing: border-box; }
      .bedcontainer { margin-top: 0; }
      .grid.grid-gap-30 { height: 100%; }
      .column.grid-gap-10 {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      .bed-title {
        flex: 1;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        min-height: 0;
        padding-top: 22px !important;
        padding-bottom: 14px !important;
        /* Anchor for the absolute-positioned drying pill so it floats
           over the empty top-right corner instead of pushing content
           down (which would misalign sibling AMS cards). */
        position: relative;
      }
      .partTitle { flex-shrink: 0; margin-bottom: 16px; }

      /* Drying status — absolute-positioned in the top-right corner of
         the AMS card, floating over empty space. Doesn't push content
         down, so AMS #1 (drying) and AMS #2 (idle) keep the same
         layout — header / temp / humidity / trays all start at the
         same y-coordinate on both cards regardless of drying state. */
      .ams-drying-row {
        position: absolute;
        top: 18px;
        right: 18px;
        z-index: 2;
      }
      .ams-drying-status {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 4px .85em 4px .65em;
        background: rgba(226, 160, 74, 0.22);
        color: #f0b35e;
        border: 1px solid rgba(226, 160, 74, 0.6);
        border-radius: 10rem;
        font-size: 0.78em;
        font-weight: 700;
        letter-spacing: 0.04em;
        white-space: nowrap;
        animation: drying-breathe 2.4s ease-in-out infinite;
      }
      /* "DRYING" label gets emphasis treatment — uppercase + extra
         spacing — so the word, not just the numbers, conveys what's
         happening. Numbers stay normal-case for readability. */
      .ams-drying-status .drying-label {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 800;
      }
      /* Soft pulse — gives a sign of life without the alarm-y feel of a
         high-contrast pulse. Just nudges the border + bg alpha. */
      @keyframes drying-breathe {
        0%, 100% {
          background: rgba(226, 160, 74, 0.18);
          border-color: rgba(226, 160, 74, 0.5);
        }
        50% {
          background: rgba(226, 160, 74, 0.28);
          border-color: rgba(226, 160, 74, 0.75);
        }
      }
      /* Tiny fan icon inside the pill — uses the same approach as the
         fans widget (/widgets/fans/index.html): wrapper is the layout
         box, icon is absolutely positioned dead-center and rotated via
         translate(-50%, -50%) + rotate. The translate keeps the icon
         centered while the rotate happens, so it spins truly in place
         instead of wobbling around its baseline. */
      /* Inline SVG fan — viewBox centered on (0,0) so rotation is around
         the geometric center of the visible blades. material-symbols
         glyphs have asymmetric internal padding so they don't center
         cleanly under pure CSS rotation. */
      .ams-drying-status .drying-fan {
        display: inline-block;
        width: 1.4em;
        height: 1.4em;
        vertical-align: -0.32em;
        color: #f0b35e;
        fill: currentColor;
        animation: drying-fan-spin 2.4s linear infinite;
        transform-origin: 50% 50%;
        will-change: transform;
      }
      @keyframes drying-fan-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      /* Header section — temp progress + Current/Max + humidity bars.
         Sized to actually use the top portion of the iframe instead of
         feeling like a thin strip above giant trays. The trays section
         still expands to fill remaining space (flex: 1), but the header
         has explicit min-height + bigger internal spacing so it claims
         a reasonable share of vertical real estate. */
      .ams-header {
        flex-shrink: 0;
        min-height: 150px;
        margin-bottom: 22px;
        padding: 4px 0 10px;
      }
      .ams-header .progress { height: 12px; }
      .ams-header .temp-row {
        display: flex;
        justify-content: space-between;
        margin: 14px 0 20px;
      }
      .ams-header .temp-row h4 { margin: 0; }
      .ams-header .humidity-container { margin: 0; }
      .ams-header .humidity-item { height: 14px; }
      .ams-header .ams-type-remaining { margin-top: 10px; }

      /* Section divider between header and trays — small dim label with
         a faint top border so users see the visual break between
         "AMS chamber stats" and "what's loaded in each slot". */
      .trays-label {
        flex-shrink: 0;
        margin: 4px 0 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.85em;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
      }

      /* Trays section — 4 evenly-distributed rows in a clean list style:
         thin horizontal separator between rows (no per-row card border or
         background). Less visually heavy than the previous card-per-tray
         look — the rows feel like a list inside the AMS card rather than
         boxes inside a box. */
      .ams-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .ams-container .element {
        flex: 1;
        min-height: 0;
        padding: 4px 4px 4px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        align-content: center;
        box-sizing: border-box;
        transition: background 0.2s, box-shadow 0.2s;
      }
      .ams-container .element:last-child { border-bottom: none; }
      /* Active tray — same green-tinted-card treatment as the active-nozzle
         widget so the two card types read consistently across the dashboard:
         subtle green wash + full green inset border + soft inset glow.
         JS toggles `.tray-active`. */
      .ams-container .element.tray-active {
        background: rgba(81, 163, 79, 0.10);
        box-shadow: 0 0 0 1px rgba(81, 163, 79, 0.55) inset,
                    0 0 0 2px rgba(81, 163, 79, 0.20) inset;
        border-radius: 4px;
      }
      .ams-container .dot-content {
        padding-bottom: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .ams-container .element.tray-empty .progress-wrapper { visibility: hidden; }
    </style>
    <script src="../_customizer.js"></script>
    <script src="../_amsActive.js"></script>
    <script src="../../assets/js/jquery-3.6.0.min.js"></script>
    <meta http-equiv="refresh" content="28800" />
  </head>

  <link rel="stylesheet" href="../../assets/css/material-symbols.css" />
  <body>
    <div class="container">
      <div class="bedcontainer">
        <div class="grid grid-gap-30">
          <div class="column grid-gap-10">
            <div class="bed-title">
              <h2 class="partTitle">AMS #1</h2>
              <div class="ams-drying-row" style="display:none">
                <span id="dryingStatusPill" class="ams-drying-status"></span>
              </div>

              <!-- Header: AMS chamber temp + Current/Max + humidity bar -->
              <div class="ams-header">
                <div class="progress-wrapper">
                  <div id="amsProgressBarParent" class="progress">
                    <div id="amsProgressBar" class="progress-bar" style="width: 5px; background-color: #FFCC41;"></div>
                  </div>
                </div>
                <div class="temp-row">
                  <h4 class="finePrint">
                    <b>Current: <span id="amsCurrentTempC">0</span></b><span id="amsCurrentTempSymbolsC"><b><sup>°</sup>C</b></span>
                    <span style="color:grey;"><span id="amsCurrentTempF">0</span><span id="amsCurrentTempSymbolsF"><sup>°</sup>F</span></span>
                  </h4>
                  <h4 class="finePrint">
                    <b>Max: <span id="amsTargetTempC">0</span><span id="amsTargetTempSymbolsC"><sup>°</sup>C</b></span>
                    <span style="color:grey;"><span id="amsTargetTempF">0</span><span id="amsTargetTempSymbolsF"><sup>°</sup>F</span></span>
                  </h4>
                </div>
                <div class="humidity-container">
                  <div class="progress-segment">
                    <div id="humidity1" class="humidity-item green-common"></div>
                    <div id="humidity2" class="humidity-item green-common"></div>
                    <div id="humidity3" class="humidity-item green-common"></div>
                    <div id="humidity4" class="humidity-item green-common"></div>
                    <div id="humidity5" class="humidity-item"></div>
                  </div>
                  <div class="ams-type-remaining">
                    <h4 class="finePrint">Humidity <span id="humidityPercent" class="fade" style="font-weight:400"></span></h4>
                    <h4 id="humidityLevelText" class="finePrint">Low</h4>
                  </div>
                </div>
              </div>

              <div class="trays-label">Trays</div>

              <!-- 4 tray rows -->
              <div class="ams-container">
                <div class="element">
                  <span id="tray1Color" class="dot" style="background-color: grey"></span>
                  <div class="dot-content">
                    <div class="flex">
                      <h3 id="tray1Material" class="material">Inactive</h3>
                      <span id="tray1Active" class="badge-active" style="display: none">active</span>
                      <span id="tray1Target" class="badge-target" style="display: none">target</span>
                    </div>
                    <div class="ams-type-remaining">
                      <h4 id="tray1Type" class="finePrint"></h4>
                      <h4 id="tray1Remaining" class="finePrint">0%</h4>
                    </div>
                    <div class="progress-wrapper">
                      <div id="tray1ProgressBarParent" class="progress">
                        <div id="tray1ProgressBar" class="progress-bar" style="width: 0px; background-color: #51a34f"></div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="element">
                  <span id="tray2Color" class="dot" style="background-color: grey"></span>
                  <div class="dot-content">
                    <div class="flex">
                      <h3 id="tray2Material" class="material">Inactive</h3>
                      <span id="tray2Active" class="badge-active" style="display: none">active</span>
                      <span id="tray2Target" class="badge-target" style="display: none">target</span>
                    </div>
                    <div class="ams-type-remaining">
                      <h4 id="tray2Type" class="finePrint"></h4>
                      <h4 id="tray2Remaining" class="finePrint">0%</h4>
                    </div>
                    <div class="progress-wrapper">
                      <div id="tray2ProgressBarParent" class="progress">
                        <div id="tray2ProgressBar" class="progress-bar" style="width: 0px; background-color: #51a34f"></div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="element">
                  <span id="tray3Color" class="dot" style="background-color: grey"></span>
                  <div class="dot-content">
                    <div class="flex">
                      <h3 id="tray3Material" class="material">Inactive</h3>
                      <span id="tray3Active" class="badge-active" style="display: none">active</span>
                      <span id="tray3Target" class="badge-target" style="display: none">target</span>
                    </div>
                    <div class="ams-type-remaining">
                      <h4 id="tray3Type" class="finePrint"></h4>
                      <h4 id="tray3Remaining" class="finePrint">0%</h4>
                    </div>
                    <div class="progress-wrapper">
                      <div id="tray3ProgressBarParent" class="progress">
                        <div id="tray3ProgressBar" class="progress-bar" style="width: 0px; background-color: #51a34f"></div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="element">
                  <span id="tray4Color" class="dot" style="background-color: grey"></span>
                  <div class="dot-content">
                    <div class="flex">
                      <h3 id="tray4Material" class="material">Inactive</h3>
                      <span id="tray4Active" class="badge-active" style="display: none">active</span>
                      <span id="tray4Target" class="badge-target" style="display: none">target</span>
                    </div>
                    <div class="ams-type-remaining">
                      <h4 id="tray4Type" class="finePrint"></h4>
                      <h4 id="tray4Remaining" class="finePrint">0%</h4>
                    </div>
                    <div class="progress-wrapper">
                      <div id="tray4ProgressBarParent" class="progress">
                        <div id="tray4ProgressBar" class="progress-bar" style="width: 0px; background-color: #51a34f"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="AMS_script.js"></script>
  </body>
</html>
