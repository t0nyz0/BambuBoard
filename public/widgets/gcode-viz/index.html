<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>BambuBoard — Gcode Toolpath</title>
    <link rel="stylesheet" type="text/css" href="../styles.css" />
    <script src="../_customizer.js"></script>
    <script src="../../js/caps.js"></script>
    <meta http-equiv="refresh" content="28800" />
    <style>
      /* Transparent body so the widget composites over whatever sits behind
         the OBS browser-source / dashboard iframe. !important needed because
         widgets/styles.css applies a dark body color by default. */
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: transparent !important; }
      .gcode-stage { position: relative; width: 100vw; height: 100vh; background: transparent; }
      .gcode-stage canvas { display: block; width: 100% !important; height: 100% !important; background: transparent; }
      /* Centered loading/error message — large enough to read at a glance
         when the user is checking in on a new print. Default state is the
         small bottom-of-canvas hint; .loading promotes it to a centered
         pill so transitions between prints are visibly explained. */
      .gcode-overlay {
        position: absolute; inset: auto 0 8px 0;
        text-align: center; font-size: 12px; opacity: .7;
        pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,.6);
      }
      .gcode-overlay.loading {
        inset: 50% 0 auto 0; transform: translateY(-50%);
        font-size: 32px; font-weight: 600; opacity: 1; letter-spacing: 0.5px;
      }
      .gcode-overlay.loading::before {
        content: ''; display: inline-block; width: 14px; height: 14px;
        margin-right: 12px; border-radius: 50%;
        background: #ffd166; box-shadow: 0 0 10px 2px rgba(255,209,102,0.55);
        animation: gcode-pulse 1.2s ease-in-out infinite;
        vertical-align: middle;
      }
      @keyframes gcode-pulse {
        0%,100% { opacity: 0.4; transform: scale(0.85); }
        50%     { opacity: 1.0; transform: scale(1.10); }
      }
      .gcode-overlay.error { color: #f0a; opacity: 1; }
      .gcode-debug {
        display: none;
        position: absolute; left: 12px; right: 12px; bottom: 12px;
        padding: 8px 12px;
        background: rgba(20,22,28,.72); color: #e6e8ee;
        font: 12px/1 'Open Sans', sans-serif;
        border: 1px solid rgba(255,255,255,.08); border-radius: 6px;
        backdrop-filter: blur(4px);
        flex-direction: column; gap: 6px;
      }
      .gcode-debug.show { display: flex; }
      .gcode-debug .row { display: flex; gap: 10px; align-items: center; }
      .gcode-debug input[type=range] { flex: 1; }
      .gcode-debug button {
        background: #2a2d36; color: #e6e8ee; border: 1px solid #3a3d46;
        border-radius: 4px; padding: 4px 10px; cursor: pointer;
        font: 12px/1 'Open Sans', sans-serif;
      }
      .gcode-debug button:hover { background: #353945; }
      .gcode-debug .tag { min-width: 44px; opacity: .6; font-size: 11px; }
      .gcode-debug .label { min-width: 90px; text-align: right; opacity: .8; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "../../vendor/three.module.js",
          "lil-gui": "../../vendor/lil-gui.esm.js"
        }
      }
    </script>
  </head>
  <body>
    <div class="gcode-stage">
      <canvas id="gcodeCanvas"></canvas>
      <div class="gcode-overlay" id="gcodeOverlay">waiting for print…</div>
      <div class="gcode-debug" id="gcodeDebug">
        <div class="row">
          <span class="tag">Layer</span>
          <button id="gcodePrev" title="Previous layer">⏮</button>
          <button id="gcodePlay" title="Play / pause">▶</button>
          <button id="gcodeNext" title="Next layer">⏭</button>
          <input type="range" id="gcodeScrub" min="0" max="0" value="0" step="1" />
          <span class="label" id="gcodeLabel">layer 0 / 0</span>
        </div>
        <div class="row">
          <span class="tag">Path</span>
          <input type="range" id="gcodePath" min="0" max="1000" value="0" step="1" />
          <span class="label" id="gcodePathLabel">0%</span>
        </div>
      </div>
    </div>
    <script type="module" src="GCODE_script.js"></script>
  </body>
</html>
