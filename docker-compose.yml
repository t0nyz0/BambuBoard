services:
  bambuboard:
    build: .
    image: ghcr.io/t0nyz0/bambuboard:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - BAMBUBOARD_HTTP_PORT=8080
      - BAMBUBOARD_PRINTER_NAME=My Printer
      - BAMBUBOARD_PRINTER_TYPE=X1
      - BAMBUBOARD_PRINTER_URL=10.0.0.1
      - BAMBUBOARD_PRINTER_PORT=8883
      - BAMBUBOARD_PRINTER_SN=
      - BAMBUBOARD_PRINTER_ACCESS_CODE=
      - BAMBUBOARD_TEMP_SETTING=Both
      - BAMBUBOARD_FAN_ICONS=true
      - BAMBUBOARD_LOGGING=false
    volumes:
      - ./config.json:/usr/src/app/config.json
      - ./data:/usr/src/app/data
      - ./OBS_settings:/usr/src/app/OBS_settings
